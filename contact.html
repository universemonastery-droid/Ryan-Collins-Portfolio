<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Ryan Collins</title>
    <link rel="stylesheet" href="Style/style.css" />
    <script src="scripts/main.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <span class="logo">Ryan Collins</span>
        <nav>
          <ul>
            <li><a href="index.html">BACK</a></li>
          </ul>
        </nav>
        <a
          href="assets/resume-Ryan-Collins.pdf"
          target="_blank"
          class="resumelink"
          >Resume</a
        >
      </div>
    </header>

    <main>
      <section class="page-banner">
        <div class="container">
          <h1>Get In <span class="highlight">Touch</span></h1>
          <p class="tagline">
            Let me know if you are interested in my skills or just want to send
            me a 'meme' below!
          </p>
        </div>
      </section>

      <section class="contact-section">
        <div class="container">
          <form action="#" method="post" class="contact-form">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your Name"
                required
              />
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@gmail.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="message">Your Message</label>
              <textarea
                id="message"
                name="message"
                rows="6"
                placeholder="Tell me your secrets... (Again)"
                required
              ></textarea>
            </div>

            <button type="submit" class="cta-primary">Send Message</button>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2026 ~Ryan Collins</p>
      </div>
    </footer>
  </body>
</html>
